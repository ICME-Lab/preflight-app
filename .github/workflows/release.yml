name: Release

# Tag-driven release: `git tag v0.1.2 && git push origin v0.1.2` builds the
# app on every platform listed in the matrix and attaches the resulting
# installers (.dmg on macOS, .msi/.exe on Windows) to a single draft GitHub
# Release named after the tag. The Release stays in draft until you publish
# it manually.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: "x86_64-pc-windows-msvc"

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: npm ci

      - name: Build and publish to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. Empty on non-macOS runners
          # (tauri-action ignores them); kept here as a single env block so
          # the workflow stays compact.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Preflight ${{ github.ref_name }}"
          releaseBody: |
            macOS universal `.dmg` + Windows `.msi` / `.exe`.

            macOS: signed and notarized if the APPLE_* secrets are configured;
            otherwise ad-hoc signed (right-click → Open or
            `xattr -dr com.apple.quarantine /Applications/Preflight.app`).

            Windows: unsigned. Microsoft SmartScreen may warn on first launch
            ("More info" → "Run anyway"). Signing requires a Windows
            code-signing certificate.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
