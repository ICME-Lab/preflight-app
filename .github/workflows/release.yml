name: Release

# Tag-driven release: `git tag v0.1.1 && git push origin v0.1.1` builds a
# universal-apple-darwin .dmg and attaches it to a draft GitHub Release named
# after the tag. The Release stays in draft until you publish it manually,
# giving you a chance to test the artifact first.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS universal
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: npm ci

      - name: Build, sign, notarize, and publish to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (Developer ID Application certificate).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization (uses an app-specific password from appleid.apple.com).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Preflight ${{ github.ref_name }}"
          releaseBody: |
            macOS universal build (Apple Silicon + Intel), signed and notarized.
            Download the .dmg, drag to /Applications, double-click. No warnings.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
